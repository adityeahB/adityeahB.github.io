<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WriteBright – AI Writing Tool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    name="description"
    content="WriteBright – an AI-powered writing tool embedded in my website."
  />

  <!-- Basic reset so the iframe can use full screen -->
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, Helvetica, Arial, sans-serif;
      background: #020617;
      color: #e5e7eb;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      width: 100%;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid rgba(148, 163, 184, 0.35);
      background: radial-gradient(circle at top left, #0f172a 0, #020617 55%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .brand-title {
      font-size: 0.95rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: #e5e7eb;
    }

    .brand-sub {
      font-size: 0.75rem;
      color: #9ca3af;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.85rem;
    }

    .nav-links a {
      color: #cbd5f5;
      text-decoration: none;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      border: 1px solid transparent;
      transition: all 0.18s ease-out;
      background: transparent;
      white-space: nowrap;
    }

    .nav-links a:hover {
      border-color: rgba(129, 140, 248, 0.6);
      background: rgba(15, 23, 42, 0.9);
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.35),
                  0 10px 30px rgba(15, 23, 42, 0.9);
    }

    .nav-links a.primary {
      background: linear-gradient(135deg, #4f46e5, #22c55e);
      color: #f9fafb;
      box-shadow:
        0 0 0 1px rgba(191, 219, 254, 0.35),
        0 12px 35px rgba(15, 23, 42, 0.9);
    }

    .nav-links a.primary:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
      box-shadow:
        0 0 0 1px rgba(191, 219, 254, 0.7),
        0 18px 45px rgba(15, 23, 42, 0.95);
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .iframe-wrapper {
      flex: 1;
      min-height: 0;
      position: relative;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #020617;
    }

    .fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
      color: #e5e7eb;
      background:
        radial-gradient(circle at top, rgba(79, 70, 229, 0.18), transparent 55%),
        radial-gradient(circle at bottom, rgba(16, 185, 129, 0.12), transparent 60%),
        #020617;
    }

    .fallback-inner {
      max-width: 480px;
      border-radius: 1rem;
      padding: 1.5rem 1.75rem;
      border: 1px solid rgba(148, 163, 184, 0.6);
      background: radial-gradient(circle at top left, #020617, #020617 40%, #020617 100%);
      box-shadow:
        0 0 0 1px rgba(15, 23, 42, 1),
        0 18px 60px rgba(15, 23, 42, 1);
    }

    .fallback-title {
      font-size: 1.05rem;
      margin-bottom: 0.4rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #e5e7eb;
    }

    .fallback-text {
      font-size: 0.85rem;
      color: #9ca3af;
      margin-bottom: 0.75rem;
    }

    .fallback-url {
      font-size: 0.8rem;
      color: #cbd5f5;
      word-break: break-all;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
        "Liberation Mono", "Courier New", monospace;
    }

    @media (max-width: 640px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }
      .nav-links {
        width: 100%;
        justify-content: flex-start;
        flex-wrap: wrap;
      }
      .nav-links a {
        padding: 0.35rem 0.7rem;
      }
      .fallback-inner {
        padding: 1.25rem 1.4rem;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="brand">
      <div class="brand-title">WriteBright</div>
      <div class="brand-sub">AI writing tool embedded in my site</div>
    </div>
    <nav class="nav-links">
      <!-- Change this href to your real home page if different -->
      <a href="index.html">Home</a>
      <a href="greeneu.html">GreenEU</a>
      <a class="primary" href="writebright.html">WriteBright tool</a>
    </nav>
  </header>

  <main>
    <div class="iframe-wrapper">
      <!-- VERY IMPORTANT: replace the src URL below with your real Vercel deployment link -->
      <iframe
        src="https://writebright.vercel.app"
        title="WriteBright AI App"
        loading="eager"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
      ></iframe>

      <!-- Optional visible fallback if the iframe fails to load -->
      <noscript>
        <div class="fallback">
          <div class="fallback-inner">
            <div class="fallback-title">JavaScript required</div>
            <p class="fallback-text">
              To use the WriteBright AI tool, please enable JavaScript in your browser
              and reload the page.
            </p>
            <p class="fallback-url">
              App URL: https://writebright.vercel.app
            </p>
          </div>
        </div>
      </noscript>
    </div>
  </main>
</body>
</html>
